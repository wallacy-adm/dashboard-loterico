                                    ${filtros.rota !== 'todas' ? `<span class="bg-purple-600 text-white px-2 py-1 rounded-full text-xs font-semibold">Rota ${filtros.rota}</span>` : ''}
                                    ${filtros.ponto !== 'todos' ? `<span class="bg-pink-600 text-white px-2 py-1 rounded-full text-xs font-semibold">Ponto ${filtros.ponto}</span>` : ''}
                                </div>
                            </div>
                        ` : ''}
                        
                        ${!podeMostrarDespesas ? `
                            <div class="bg-blue-50 border-2 border-blue-300 rounded-lg p-3 mb-4">
                                <div class="text-sm text-blue-800">
                                    💡 Despesas disponíveis a partir de jan/2026
                                </div>
                            </div>
                        ` : ''}
                        
                        <!-- AJUSTE 2: Layout com legenda à esquerda quando múltiplos pontos -->
                        ${filtros.mostrarTodosPontos && filtros.ponto === 'todos' ? `
                            <div style="display: flex; gap: 16px; align-items: flex-start;">
                                <!-- Legenda à esquerda -->
                                <div id="legenda-pontos" style="flex-shrink: 0; width: 110px; background: #f9fafb; border-radius: 8px; padding: 12px; max-height: 400px; overflow-y: auto;">
                                    <div style="font-size: 11px; font-weight: 600; color: #6b7280; margin-bottom: 8px; text-transform: uppercase;">Pontos</div>
                                    <!-- Será preenchido dinamicamente -->
                                </div>
                                <!-- Gráfico à direita -->
                                <div style="flex: 1; min-width: 0;">
                                    <canvas id="chart-evolucao" style="max-height: 400px;"></canvas>
                                </div>
                            </div>
                        ` : `
                            <canvas id="chart-evolucao" style="max-height: 400px;"></canvas>
                        `}
                    </div>
                    
                    <!-- NOVO: 5 cards (com Pico Mínimo) -->
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                        <div class="bg-blue-50 border-2 border-blue-200 rounded-lg p-5">
                            <div class="text-xs text-blue-700 font-semibold mb-1 uppercase">Período Inicial</div>
                            <div class="text-sm text-blue-600 mb-1">Vendas</div>
                            <div class="text-xl font-bold text-blue-900">R$ ${fmt(valorInicial)}</div>
                            ${podeMostrarDespesas ? `
                                <div class="text-sm text-blue-600 mb-1 mt-2">Despesas</div>
                                <div class="text-xl font-bold text-red-700">R$ ${fmt(valorInicialDesp)}</div>
                            ` : ''}
                            <div class="text-xs text-blue-600 mt-1">${evoVendas[0].periodo}</div>
                        </div>
                        
                        <div class="bg-green-50 border-2 border-green-200 rounded-lg p-5">
                            <div class="text-xs text-green-700 font-semibold mb-1 uppercase">Período Final</div>
                            <div class="text-sm text-green-600 mb-1">Vendas</div>
                            <div class="text-xl font-bold text-green-900">R$ ${fmt(valorFinal)}</div>
                            ${podeMostrarDespesas ? `
                                <div class="text-sm text-green-600 mb-1 mt-2">Despesas</div>
                                <div class="text-xl font-bold text-red-700">R$ ${fmt(valorFinalDesp)}</div>
                            ` : ''}
                            <div class="text-xs text-green-600 mt-1">${evoVendas[evoVendas.length - 1].periodo}</div>
                        </div>
                        
                        <div class="bg-purple-50 border-2 border-purple-200 rounded-lg p-5">
                            <div class="text-xs text-purple-700 font-semibold mb-2 uppercase">Variação Total</div>
                            
                            <div class="mb-3">
                                <div class="text-sm text-purple-600 mb-0.5">Vendas: <span class="font-bold ${(valorFinal - valorInicial) < 0 ? 'text-red-700' : 'text-green-700'}">${(valorFinal - valorInicial) >= 0 ? '+' : ''}R$ ${fmt(valorFinal - valorInicial)}</span></div>
                                <div class="text-sm text-purple-600 mb-1"><span class="font-bold ${variacao < 0 ? 'text-red-700' : 'text-green-700'}">${variacao >= 0 ? '+' : ''}${fmt(variacao)}%</span></div>
                                <div class="text-xs text-purple-600 ml-2">
                                    ${variacao >= 0 ? '<span style="font-size: 14px;">📈</span> Crescimento' : '<span style="font-size: 14px;">🔻</span> Queda'}
                                </div>
                            </div>
                            
                            ${podeMostrarDespesas ? `
                                <div>
                                    <div class="text-sm text-purple-600 mb-0.5">Despesas: <span class="font-bold ${(valorFinalDesp - valorInicialDesp) < 0 ? 'text-red-700' : 'text-green-700'}">${(valorFinalDesp - valorInicialDesp) >= 0 ? '+' : ''}R$ ${fmt(valorFinalDesp - valorInicialDesp)}</span></div>
                                    <div class="text-sm text-purple-600 mb-1"><span class="font-bold ${variacaoDesp < 0 ? 'text-red-700' : 'text-green-700'}">${variacaoDesp >= 0 ? '+' : ''}${fmt(variacaoDesp)}%</span></div>
                                    <div class="text-xs text-purple-600 ml-2">
                                        ${variacaoDesp >= 0 ? '<span style="font-size: 14px;">📈</span> Aumento' : '<span style="font-size: 14px;">🔻</span> Redução'}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="bg-orange-50 border-2 border-orange-200 rounded-lg p-5">
                            <div class="text-xs text-orange-700 font-semibold mb-1 uppercase">Pico Máximo</div>
                            <div class="text-sm text-orange-600 mb-1">Vendas</div>
                            <div class="text-xl font-bold text-orange-900">R$ ${fmt(picoMaximo)}</div>
                            ${podeMostrarDespesas ? `
                                <div class="text-sm text-orange-600 mb-1 mt-2">Despesas</div>
                                <div class="text-xl font-bold text-red-700">R$ ${fmt(picoMaximoDesp)}</div>
                            ` : ''}
                            <div class="text-xs text-orange-600 mt-1">${itemPico.periodo}${podeMostrarDespesas && itemPicoDesp ? ` / ${itemPicoDesp.periodo}` : ''}</div>
                        </div>
                        
                        <!-- NOVO: Pico Mínimo -->
                        <div class="bg-red-50 border-2 border-red-200 rounded-lg p-5">
                            <div class="text-xs text-red-700 font-semibold mb-1 uppercase">Pico Mínimo</div>
                            <div class="text-sm text-red-600 mb-1">Vendas</div>
                            <div class="text-xl font-bold text-red-900">R$ ${fmt(picoMinimo)}</div>
                            ${podeMostrarDespesas ? `
                                <div class="text-sm text-red-600 mb-1 mt-2">Despesas</div>
                                <div class="text-xl font-bold text-red-700">R$ ${fmt(picoMinimoDesp)}</div>
                            ` : ''}
                            <div class="text-xs text-red-600 mt-1">${itemMin.periodo}${podeMostrarDespesas && itemMinDesp ? ` / ${itemMinDesp.periodo}` : ''}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // AJUSTE 2: Função auxiliar para calcular vendas por ponto e período
        function calcularPontosPorPeriodo(filtros) {
            const ordem = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
            const dados = state.dados.vendas;
            
            if (!dados || dados.length === 0) return {};
            
            // Criar lista de períodos
            const anoInicio = parseInt(filtros.anoInicio);
            const anoFim = parseInt(filtros.anoFim);
            const mesInicioIdx = ordem.indexOf(filtros.mesInicio);
            const mesFimIdx = ordem.indexOf(filtros.mesFim);
            
            const periodos = [];
            if (anoInicio === anoFim) {
                for (let m = mesInicioIdx; m <= mesFimIdx; m++) {
                    periodos.push({ ano: String(anoInicio), mes: ordem[m] });
                }
            } else {
                for (let ano = anoInicio; ano <= anoFim; ano++) {
                    let inicio = (ano === anoInicio) ? mesInicioIdx : 0;
                    let fim = (ano === anoFim) ? mesFimIdx : 11;
                    for (let m = inicio; m <= fim; m++) {
                        periodos.push({ ano: String(ano), mes: ordem[m] });
                    }
                }
            }
            
            // Agrupar por ponto
            const pontosPorPeriodo = {};
            
            dados.forEach(d => {
                // Aplicar filtros
                if (filtros.produto && filtros.produto !== 'todos') {
                    if ((d[filtros.produto] || 0) === 0) return; // Pular se sem vendas do produto
                }
                if (filtros.rota && filtros.rota !== 'todas' && d.rota !== filtros.rota) return;
                
                // Verificar se está no período
                const dAno = String(d.ano);
                const dMes = d.mes_nome || d.mes;
                const periodoMatch = periodos.find(p => p.ano === dAno && p.mes === dMes);
                
                if (!periodoMatch) return;
                
                const codigo = d.codigo;
                const periodoLabel = `${dMes}/${dAno}`;
                
                if (!pontosPorPeriodo[codigo]) {
                    pontosPorPeriodo[codigo] = {};
                }
                
                // Somar valor do produto selecionado
                let valor = 0;
                if (filtros.produto === 'todos') {
                    valor = (d.jb || 0) + (d.le || 0) + (d.bg || 0) + (d.cn || 0);
                } else {
                    valor = d[filtros.produto] || 0;
                }
                
                pontosPorPeriodo[codigo][periodoLabel] = (pontosPorPeriodo[codigo][periodoLabel] || 0) + valor;
            });
            
            return pontosPorPeriodo;
        }
        
        function criarGraficoEvolucao(evoVendas, evoDespesas, filtros) {
            const ctx = document.getElementById('chart-evolucao');
            if (!ctx) return;
            
            const labels = evoVendas.map(e => e.periodo);
            
            let datasets = [];
            
            // AJUSTE 2: Verificar se deve mostrar todos os pontos
            if (filtros.mostrarTodosPontos && filtros.ponto === 'todos') {
                // Modo: MISTO - Barras por ponto + Linha TOTAL
                // Paleta de cores para pontos
                const coresPontos = [
                    { border: '#10b981', bg: 'rgba(16, 185, 129, 0.8)' },  // Verde
                    { border: '#3b82f6', bg: 'rgba(59, 130, 246, 0.8)' },  // Azul
                    { border: '#f59e0b', bg: 'rgba(245, 158, 11, 0.8)' },  // Amarelo
                    { border: '#ef4444', bg: 'rgba(239, 68, 68, 0.8)' },   // Vermelho
                    { border: '#8b5cf6', bg: 'rgba(139, 92, 246, 0.8)' },  // Roxo
                    { border: '#06b6d4', bg: 'rgba(6, 182, 212, 0.8)' },   // Cyan
                    { border: '#84cc16', bg: 'rgba(132, 204, 22, 0.8)' },  // Lima
                    { border: '#f97316', bg: 'rgba(249, 115, 22, 0.8)' },  // Laranja
                    { border: '#ec4899', bg: 'rgba(236, 72, 153, 0.8)' },  // Rosa
                    { border: '#6b7280', bg: 'rgba(107, 114, 128, 0.8)' }  // Cinza
                ];
                
                // Obter lista de pontos únicos
                const pontos = calcularPontosPorPeriodo(filtros);
                const listaPontos = Object.keys(pontos);
                
                // Limitar a 10 pontos (top 10 por vendas totais)
                const pontosComTotal = listaPontos.map(codigo => {
                    const totalVendas = labels.reduce((sum, periodo) => {
                        return sum + (pontos[codigo][periodo] || 0);
                    }, 0);
                    return { codigo, totalVendas };
                });
                
                const top10Pontos = pontosComTotal
                    .sort((a, b) => b.totalVendas - a.totalVendas)
                    .slice(0, 10)
                    .map(p => p.codigo);
                
                // Criar dataset de BARRA para cada ponto
                top10Pontos.forEach((codigo, idx) => {
                    const cor = coresPontos[idx % coresPontos.length];
                    const valores = labels.map(periodo => pontos[codigo][periodo] || 0);
                    
                    datasets.push({
                        type: 'bar', // TIPO: BARRA
                        label: `Ponto ${codigo}`,
                        data: valores,
                        backgroundColor: cor.bg,
                        borderColor: cor.border,
                        borderWidth: 1,
                        borderRadius: 4
                    });
                });
                
                // Criar dataset de LINHA para o TOTAL
                const valoresTotal = labels.map(periodo => {
                    return top10Pontos.reduce((sum, codigo) => {
                        return sum + (pontos[codigo][periodo] || 0);
                    }, 0);
                });
                
                datasets.push({
                    type: 'line', // TIPO: LINHA
                    label: 'TOTAL GERAL',
                    data: valoresTotal,
                    borderColor: '#7c3aed',
                    backgroundColor: 'transparent',
                    borderWidth: 3,
                    borderDash: [8, 4], // Tracejada
                    tension: 0.3,
                    pointBackgroundColor: '#7c3aed',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 6,
                    pointHoverRadius: 8,
                    order: 0 // Desenhar por cima das barras
                });
                
                // Aviso se há mais de 10 pontos
                if (listaPontos.length > 10) {
                    console.log(`⚠️ Mostrando top 10 de ${listaPontos.length} pontos`);
                }
                
            } else {
                // Modo normal: 1 linha agregada
                const valoresVendas = evoVendas.map(e => e.valor);
                
                datasets.push({
                    label: 'Vendas',
                    data: valoresVendas,
                    borderColor: '#8b5cf6',
                    backgroundColor: 'rgba(139, 92, 246, 0.1)',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    pointBackgroundColor: '#8b5cf6',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 6,
                    pointHoverRadius: 8
                });
                
                // Adicionar linha de despesas se disponível
                if (evoDespesas) {
                    const valoresDespesas = evoDespesas.map(e => e.valor);
                    datasets.push({
                        label: 'Despesas',
                        data: valoresDespesas,
                        borderColor: '#dc2626',
                        backgroundColor: 'rgba(220, 38, 38, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#dc2626',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8
                    });
                }
            }
            
            state.charts.evolucao = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            display: filtros.mostrarTodosPontos ? false : true, // AJUSTE 2: Ocultar legenda padrão se múltiplos pontos
                            labels: {
                                font: { size: 14 },
                                padding: 15
                            }
                        },
                        tooltip: {
                            backgroundColor: '#fff',
                            borderColor: '#e5e7eb',
                            borderWidth: 1,
                            titleColor: '#374151',
                            bodyColor: '#6b7280',
                            padding: 12,
                            cornerRadius: 8,
                            callbacks: {
                                label: (context) => {
                                    return `${context.dataset.label}: R$ ${fmt(context.parsed.y)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: '#e5e7eb',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#6b7280',
                                font: { size: 14 },
                                callback: (value) => `R$ ${(value / 1000).toFixed(0)}k`
                            }
                        },
                        x: {
                            grid: {
                                color: '#e5e7eb',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#6b7280',
                                font: { size: 12 },
                                maxRotation: 45,
                                minRotation: 45
                            }
                        }
                    }
                }
            });
            
            // AJUSTE 2: Popular legenda customizada à esquerda (se ativado)
            if (filtros.mostrarTodosPontos && filtros.ponto === 'todos') {
                const legendaDiv = document.getElementById('legenda-pontos');
                if (legendaDiv && datasets.length > 0) {
                    // Criar HTML da legenda
                    let legendaHTML = '<div style="font-size: 11px; font-weight: 600; color: #6b7280; margin-bottom: 8px; text-transform: uppercase;">Pontos</div>';
                    
                    datasets.forEach((dataset, idx) => {
                        const cor = dataset.borderColor;
                        const label = dataset.label.replace('Ponto ', ''); // Remover "Ponto " do label
                        
                        legendaHTML += `
                            <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 6px; padding: 4px; border-radius: 4px; cursor: pointer; transition: background 0.2s;" 
                                 onmouseover="this.style.background='#e5e7eb'" 
                                 onmouseout="this.style.background='transparent'"
                                 onclick="toggleDataset(${idx})">
                                <div style="width: 14px; height: 2px; background: ${cor}; flex-shrink: 0; border-radius: 1px;"></div>
                                <span style="font-size: 11px; color: #374151; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${label}</span>
                            </div>
                        `;
                    });
                    
                    legendaDiv.innerHTML = legendaHTML;
                }
            }
        }
        
        // AJUSTE 2: Função para toggle de dataset (mostrar/ocultar linha)
        function toggleDataset(datasetIndex) {
            const chart = state.charts.evolucao;
            if (!chart) return;
            
            const meta = chart.getDatasetMeta(datasetIndex);
            meta.hidden = !meta.hidden;
            chart.update();
        }

        // ==================== INTERAÇÃO ====================
        
        function trocarAba(aba) {
            destruirGraficos();
            state.abaAtiva = aba;
            render();
        }

        function atualizarFiltro(aba, campo, valor) {
            destruirGraficos();
            state.filtros[aba][campo] = valor;
            
            // Se mudar ano/mês/rota, limpar cache de opções
            if (['ano', 'mes', 'rota'].includes(campo)) {
                state.cache = {};
            }
            
            render();
        }

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const wb = XLSX.read(event.target.result, { type: 'binary' });
                    const vendas = processarVendas(wb);
                    const despesas = processarDespesas(wb, vendas);
                    
                    state.dados = { vendas, despesas };
                    
                    // Inicializar períodos
                    const anos = [...new Set(vendas.map(v => v.ano))].sort();
                    const meses = [...new Set(vendas.map(v => v.mes_nome))];
                    const ordem = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
                    const mesesOrdenados = meses.sort((a, b) => ordem.indexOf(a) - ordem.indexOf(b));
                    const rotas = [...new Set(vendas.map(v => v.rota))].sort();
                    
                    if (anos.length >= 1 && mesesOrdenados.length >= 2) {
                        // Comparativo
                        state.filtros.comparativo.anoA = anos[anos.length - 1];
                        state.filtros.comparativo.mesA = mesesOrdenados[0];
                        state.filtros.comparativo.anoB = anos[anos.length - 1];
                        state.filtros.comparativo.mesB = mesesOrdenados[Math.min(1, mesesOrdenados.length - 1)];
                        // Rota permanece 'todas' (valor inicial do state)
                        
                        // Evolução
                        state.filtros.evolucao.anoInicio = anos[0];
                        state.filtros.evolucao.mesInicio = mesesOrdenados[0];
                        state.filtros.evolucao.anoFim = anos[0];
                        state.filtros.evolucao.mesFim = mesesOrdenados[Math.min(3, mesesOrdenados.length - 1)];
                    }
                    
                    log('✅ Dados carregados:', { 
                        vendas: vendas.length, 
                        despesas: despesas.length,
                        anos: anos
                    });
                    render();
                } catch (error) {
                    console.error('Erro:', error);
                    alert('❌ Erro ao processar arquivo: ' + error.message);
                }
            };
            reader.readAsBinaryString(file);
        }

        // ==================== INICIALIZAÇÃO ====================
        
        window.addEventListener('load', () => {
            setTimeout(render, 100);
        });
    </script>
